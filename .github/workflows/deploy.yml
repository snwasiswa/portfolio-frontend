name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build Angular app
      run: npm run build -- --configuration production

    - name: Write runtime config
      env:
        API_URL: ${{ secrets.API_URL }}
      run: |
        mkdir -p ./dist/portfolio-frontend/browser
        echo "{\"apiUrl\": \"${API_URL:-https://api.example.com}\"}" > ./dist/portfolio-frontend/browser/config.json

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist/portfolio-frontend/browser
        force_orphan: true
