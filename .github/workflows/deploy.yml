name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Opt into Node.js 24 for JavaScript actions to avoid Node 20 deprecation warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app with computed base-href
        run: |
          set -e
          # Extract repo name and owner from GITHUB_REPOSITORY (owner/repo)
          REPO_NAME=${GITHUB_REPOSITORY##*/}
          OWNER=${GITHUB_REPOSITORY%%/*}

          # If repo is a user/org site like owner.github.io then use root base-href
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            BASE_HREF='/'
          else
            BASE_HREF="/${REPO_NAME}/"
          fi

          echo "Computed BASE_HREF=${BASE_HREF}"

          # Build using the computed base href (so assets load correctly on GitHub Pages)
          npx ng build --configuration production --base-href "$BASE_HREF"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/portfolio-frontend

      - name: Ensure GitHub Pages is serving the gh-pages branch
        if: ${{ success() }}
        run: |
          echo "Setting Pages source to gh-pages/ (root) via REST API"
          OWNER=${GITHUB_REPOSITORY%%/*}
          REPO=${GITHUB_REPOSITORY##*/}
          echo "Owner: $OWNER Repo: $REPO"
          # Update Pages site source to gh-pages branch root. Requires pages:write permission.
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$OWNER/$REPO/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}' | jq . || true

